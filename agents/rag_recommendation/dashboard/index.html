<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agents Trend Radar — Multi-Agent RAG Recommendations</title>
    <meta name="description" content="Discover trending AI agents and agentic AI topics with personalized recommendations powered by a multi-agent RAG engine.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ═══ Animated background particles ═══ -->
    <div class="bg-particles" id="particles"></div>

    <!-- ═══ Header ═══ -->
    <header class="glass-header">
        <div class="header-content">
            <div class="logo-group">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#grad1)" stroke-width="2"/>
                        <circle cx="14" cy="16" r="4" fill="url(#grad1)"/>
                        <circle cx="26" cy="16" r="4" fill="url(#grad2)"/>
                        <circle cx="20" cy="28" r="4" fill="url(#grad3)"/>
                        <line x1="14" y1="16" x2="26" y2="16" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>
                        <line x1="14" y1="16" x2="20" y2="28" stroke="url(#grad2)" stroke-width="1.5" opacity="0.6"/>
                        <line x1="26" y1="16" x2="20" y2="28" stroke="url(#grad3)" stroke-width="1.5" opacity="0.6"/>
                        <defs>
                            <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                                <stop stop-color="#6C63FF"/>
                                <stop offset="1" stop-color="#3B82F6"/>
                            </linearGradient>
                            <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
                                <stop stop-color="#8B5CF6"/>
                                <stop offset="1" stop-color="#6C63FF"/>
                            </linearGradient>
                            <linearGradient id="grad3" x1="0" y1="0" x2="40" y2="40">
                                <stop stop-color="#06B6D4"/>
                                <stop offset="1" stop-color="#8B5CF6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div>
                    <h1 class="logo-text">AI Agents Trend Radar</h1>
                    <p class="logo-sub">Multi-Agent RAG Recommendation Engine</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="search-box" id="searchBox">
                    <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/></svg>
                    <input type="text" id="searchInput" placeholder="Search topics..." autocomplete="off">
                </div>
                <button class="btn-refresh" id="btnRefresh" title="Refresh data">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <!-- ═══ Stats Bar ═══ -->
        <section class="stats-bar" id="statsBar">
            <div class="stat-card glass-card">
                <span class="stat-icon">🔥</span>
                <div>
                    <span class="stat-value" id="statTopics">—</span>
                    <span class="stat-label">Topics</span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <span class="stat-icon">📄</span>
                <div>
                    <span class="stat-value" id="statItems">—</span>
                    <span class="stat-label">Items Indexed</span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <span class="stat-icon">💡</span>
                <div>
                    <span class="stat-value" id="statRecs">—</span>
                    <span class="stat-label">Recommendations</span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <span class="stat-icon">🌐</span>
                <div>
                    <span class="stat-value" id="statSources">—</span>
                    <span class="stat-label">Sources</span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <span class="stat-icon">⏱️</span>
                <div>
                    <span class="stat-value" id="statDuration">—</span>
                    <span class="stat-label">Pipeline (s)</span>
                </div>
            </div>
        </section>

        <!-- ═══ Tab Navigation ═══ -->
        <nav class="tab-nav">
            <button class="tab active" data-tab="recommendations">💡 Recommendations</button>
            <button class="tab" data-tab="trending">🔥 Trending Feed</button>
            <button class="tab" data-tab="topics">📊 Topic Analysis</button>
            <button class="tab" data-tab="sources">🌐 By Source</button>
        </nav>

        <!-- ═══ Filter Chips ═══ -->
        <div class="filter-chips" id="filterChips"></div>

        <!-- ═══ Tab Content ═══ -->
        <div class="tab-content" id="tabContent">
            <!-- Content injected by app.js -->
            <div class="loading-state" id="loadingState">
                <div class="loader"></div>
                <p>Running multi-agent pipeline...</p>
                <p class="loading-sub">Curator → Analyst → Recommender</p>
            </div>
        </div>
    </main>

    <!-- ═══ Footer ═══ -->
    <footer class="glass-footer">
        <p>Powered by <strong>3 AI Agents</strong> · ChromaDB + sentence-transformers RAG · Scraping 6 live sources</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
